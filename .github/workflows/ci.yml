name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      YAS_ANTHROPIC_API_KEY: sk-test-nonop
      YAS_DATABASE_URL: sqlite+aiosqlite:///data/activities.db
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Typecheck
        run: uv run mypy src
      - name: Migrations apply cleanly
        run: |
          mkdir -p data
          uv run alembic upgrade head
      - name: Tests
        run: uv run pytest -v

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Tests
        run: npm run test

  e2e:
    runs-on: ubuntu-latest
    env:
      YAS_ANTHROPIC_API_KEY: sk-test-nonop
      YAS_DATABASE_URL: sqlite+aiosqlite:///data/activities.db
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Python
        run: uv python install 3.12
      - name: Install backend deps
        run: uv sync --all-extras --dev
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Apply migrations
        run: |
          mkdir -p data
          uv run alembic upgrade head
      - name: Seed e2e fixtures
        run: uv run python scripts/seed_e2e.py "$YAS_DATABASE_URL"
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Start API
        env:
          YAS_STATIC_DIR: ${{ github.workspace }}/frontend/dist
          YAS_PORT: "8080"
        run: |
          uv run python -m yas api > /tmp/yas-api.log 2>&1 &
          echo $! > /tmp/yas-api.pid
      - name: Wait for /healthz
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              echo "API ready after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in 30s; api log:" >&2
          cat /tmp/yas-api.log >&2 || true
          exit 1
      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
        run: npx playwright test
        working-directory: frontend
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/yas-api.pid ]; then
            kill "$(cat /tmp/yas-api.pid)" 2>/dev/null || true
          fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  docker-build:
    # Verify the Dockerfile builds on both supported runtime architectures.
    # Native runners (no QEMU emulation) per arch via matrix.
    #
    # On push-to-main, also pushes each arch by-digest to GHCR. The
    # docker-publish job then assembles a multi-arch manifest. PRs only
    # build (no push), preserving the security boundary.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: image
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Compute OCI metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893  # v5.9.0
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=Youth Activity Scheduler
            org.opencontainers.image.description=Self-hosted youth-activity scheduler with crawl, matching, and alerting.
            org.opencontainers.image.licenses=MIT

      - name: Build (push by digest on main)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # On main: push by-digest so the publish job can stitch a multi-arch
          # manifest. On PRs: just build to verify the Dockerfile.
          outputs: |
            type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # OCI labels (manifest-level, zero Dockerfile cache impact). The
          # metadata-action auto-fills source/revision/created/url/version
          # from the workflow context.
          labels: ${{ steps.meta.outputs.labels }}
          # GIT_SHA is consumed by the trailing ARG/ENV in the Dockerfile so
          # the running container can report its commit at /healthz. Placed
          # last in the Dockerfile so this only invalidates the trailing
          # layer (which busts every commit anyway via the source COPY).
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-publish:
    # Stitch the per-arch digests pushed by docker-build into a single
    # multi-arch manifest, tagged `latest`, `main`, and `sha-<short>`.
    #
    # Future (semver releases): when cutting `git tag v1.0.0 && git push --tags`,
    # add a parallel job triggered on `push: tags: ['v*']` that uses
    # docker/metadata-action to compute v1.0.0 / v1.0 / v1 / latest tags from
    # the git ref. At that point, the `latest` tag below should drop in favor
    # of the tag-driven version so `latest` always tracks releases, not main
    # HEAD. See PR #16 description (or the docs/) for the full sketch.
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: image
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Compute OCI annotations for manifest
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893  # v5.9.0
        with:
          images: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.title=Youth Activity Scheduler
            org.opencontainers.image.description=Self-hosted youth-activity scheduler with crawl, matching, and alerting.
            org.opencontainers.image.licenses=MIT

      - name: Create multi-arch manifest + push
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          SHA: ${{ github.sha }}
          ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
        run: |
          short_sha="${SHA:0:7}"
          # Convert metadata-action's newline-separated annotations to
          # repeated --annotation flags for imagetools create.
          ann_args=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            ann_args+=("--annotation" "$line")
          done <<< "$ANNOTATIONS"
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:main" \
            --tag "${IMAGE}:sha-${short_sha}" \
            "${ann_args[@]}" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect manifest
        env:
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest"
